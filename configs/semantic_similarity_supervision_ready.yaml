output:
  processed_root: data/processed

runtime:
  device: cuda:0
  dtype: float32
  seed: 0
  block_rows: 64
  dense_debug_mode: false
  dense_debug_max_rows: 4096
  exp_clip_value: 60.0

semantic:
  formula_version: semantic_similarity_v2_dual_matrix
  pipeline_mode: with_pseudo
  # debug_save_intermediates controls extra diagnostics only; formal outputs are always saved.
  debug_save_intermediates: false
  # Compatibility-only output switch; default semantic-only path does not save S_graph.
  save_graph_compat_output: false
  softmax_domain: candidate_subgraph
  symmetrization_rule: undirected_union_arithmetic_mean
  sparsification_strategy: two_stage_topk
  params:
    alpha1: 0.5
    alpha2: 0.5
    alpha3: 0.5
    beta: 0.7
    tau: 0.07
    lambda: 0.1
  topk:
    nuswide:
      k_candidate: 400
      k_final: 150
    mirflickr25k:
      k_candidate: 300
      k_final: 120
    mscoco:
      k_candidate: 500
      k_final: 200

pseudo:
  source_mode: spectral_clustering
  z_source: fused_projection_from_x_i_x_t
  projection_mode: shared_linear_tanh
  fusion_mode: arithmetic_mean
  z_dim: 64
  affinity_builder: sparse_knn_cosine
  affinity_k: 20
  laplacian_type: symmetric_normalized
  clustering_method: spectral_kmeans
  n_clusters: 8
  pseudo_seed: 0
  external_matrix_path: null

validation:
  row_sum_atol: 1.0e-3
  symmetry_atol: 1.0e-5
  formula_atol: 1.0e-5
