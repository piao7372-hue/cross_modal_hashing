output:
  processed_root: data/processed

runtime:
  device: cuda:0
  dtype: float32
  seed: 0
  block_rows: 64
  dense_debug_mode: false
  dense_debug_max_rows: 4096
  exp_clip_value: 60.0

semantic:
  formula_version: semantic_similarity_v2_dual_matrix
  pipeline_mode: high_only
  debug_save_intermediates: false
  softmax_domain: candidate_subgraph
  symmetrization_rule: undirected_union_arithmetic_mean
  sparsification_strategy: two_stage_topk
  params:
    alpha1: 0.5
    alpha2: 0.5
    alpha3: 0.5
    beta: 0.7
    tau: 0.07
    lambda: 0.1
  topk:
    nuswide:
      k_candidate: 400
      k_final: 150
    mirflickr25k:
      k_candidate: 300
      k_final: 120
    mscoco:
      k_candidate: 500
      k_final: 200

pseudo:
  source_mode: unconfigured
  z_source: unresolved
  clustering_method: unresolved
  n_clusters: null
  pseudo_seed: 0
  external_matrix_path: null

validation:
  row_sum_atol: 1.0e-3
  symmetry_atol: 1.0e-5
  formula_atol: 1.0e-5
